name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Install dependencies
        working-directory: source
        run: npm ci

      - name: Build site
        working-directory: source
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Check out Pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages

      - name: Update static build
        run: |
          rm -rf pages/assets pages/logos
          cp -R source/dist/. pages/

      - name: Commit Pages build
        working-directory: pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No Pages changes to deploy."
          else
            git commit -m "Deploy GitHub Pages"
            git push origin gh-pages
          fi
